"$schema" = "https://starship.rs/config-schema.json"

# Clean, text-first prompt optimized for Chalk theme
add_newline = false
palette = "chalk"
format = "$username$directory${custom.py_env_status}$git_branch$git_status$jobs$cmd_duration$character"

[palettes.chalk]
text = "#e0e0e0"
subtle = "#969896"
ok = "#b5bd68"
warn = "#f0c674"
err = "#cc6666"
accent = "#81a2be"
git = "#de935f"

[username]
show_always = true
format = "[$user ]($style)"
style_user = "bold fg:accent"
style_root = "bold fg:err"

[directory]
truncation_length = 3
truncate_to_repo = true
home_symbol = "~"
read_only = " [ro]"
read_only_style = "fg:warn"
style = "bold fg:text"
format = "[$path]($style)[$read_only]($read_only_style) "

[custom.py_env_status]
when = """ [ -n "$VIRTUAL_ENV" ] || [ -n "$CONDA_DEFAULT_ENV" ] """
shell = ["sh"]
command = """
if [ -n "$VIRTUAL_ENV" ]; then
  name="$(basename "$VIRTUAL_ENV")"
  short="$(printf "%.12s" "$name")"
  if [ ${#name} -gt 12 ]; then short="${short}+"; fi
  printf "%s" "$short"
elif [ -n "$CONDA_DEFAULT_ENV" ]; then
  name="$CONDA_DEFAULT_ENV"
  short="$(printf "%.12s" "$name")"
  if [ ${#name} -gt 12 ]; then short="${short}+"; fi
  printf "%s" "$short"
fi
"""
format = "[\\[$output\\] ]($style)"
style = "bold fg:accent"

[git_branch]
symbol = ""
style = "bold fg:git"
format = "[\\[$branch\\] ]($style)"

[git_status]
style = "fg:subtle"
format = "[($modified$staged$untracked$renamed$deleted$conflicted$stashed$ahead_behind)]($style) "
modified = "[M${count}](fg:warn) "
staged = "[S${count}](fg:ok) "
untracked = "[U${count}](fg:subtle) "
renamed = "R${count} "
deleted = "D${count} "
conflicted = "C${count} "
stashed = "T${count} "
ahead = "A${count} "
behind = "B${count} "
diverged = "A${ahead_count} B${behind_count} "
up_to_date = ""

[jobs]
symbol = "▧"
number_threshold = 1
format = "[$symbol$number ]($style)"
style = "fg:accent"

[cmd_duration]
min_time = 1000
format = "[took $duration ]($style)"
style = "fg:warn"

[character]
success_symbol = "[>](bold fg:ok)"
error_symbol = "[>](bold fg:err)"
vimcmd_symbol = "[<](bold fg:accent)"

[time]
disabled = true

# --- palette:auto start ---
[palettes.auto]
foreground = '#f7f6ec'
background = '#1d1d1d'
current_line = '#165776'
primary = '#343835'
box = '#165776'
blue = '#4c99d3'
cyan = '#389aac'
green = '#7bb75b'
orange = '#77592e'
pink = '#5f4190'
purple = '#a57fc4'
red = '#ce3e60'
yellow = '#e8b32a'
# --- palette:auto end ---
